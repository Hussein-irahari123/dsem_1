spring.application.name=dsem-backend

# =====================
# PostgreSQL Datasource
# =====================
spring.datasource.url=jdbc:postgresql://localhost:5434/dsem_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =====================
# JWT Configuration
# =====================
jwt.secret=dsem_super_secret_key_256bits_change_in_production_now!
jwt.expiration=86400000

# =====================
# Africa's Talking (SMS)
# =====================
africas.talking.username=sandbox
africas.talking.api-key=CHANGE_ME

# =====================
# Server
# =====================
server.port=8081

# =====================
# CORS (allow React dev server)
# =====================
spring.mvc.cors.allowed-origins=http://localhost:5174
